name: createRelease

# Workflow creates and publishes NuGet packages to GitHub Packages
# and creates a GitHub Release with release notes when a new tag is pushed.
#
# Usage:
# - Prepare release notes in releasenotes/vX.Y.Z.md before creating the tag.
# - commit and push all changes to the main branch.
# - Create and push a version tag (e.g., v1.0.0) to trigger the workflow, ex.:
#    git tag v1.0.0
#    git push origin v1.0.0

on:
  workflow_dispatch:

  push:
    tags:
      - "v*"  # Trigger when a version tag is pushed (e.g., v1.0.0)

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      contents: write
      packages: read
    env:
      GITHUB_USERNAME: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: configure-git-user
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.0.x
            8.0.x

      - name: Restore dependencies
        run: dotnet restore --configfile ./NuGet.Config

      - name: Build Package
        run: |          
          dotnet publish .\api-request-tool.csproj -c Release -f net10.0-windows

      - name: Package release artifact
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $publishDir = "bin/Release/net10.0-windows/win-x64/publish"
          $artifactName = "request-tool-$tag-win-x64.zip"

          if (-not (Test-Path $publishDir)) {
            throw "Publish output not found: $publishDir"
          }

          if (Test-Path $artifactName) {
            Remove-Item $artifactName -Force
          }

          Compress-Archive -Path "$publishDir/*" -DestinationPath $artifactName -Force
          "RELEASE_ASSET=$artifactName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          token: ${{ github.token }}
          generateReleaseNotes: false
          allowUpdates: true
          artifacts: ${{ env.RELEASE_ASSET }}
          artifactErrorsFailBuild: true
          replacesArtifacts: true
